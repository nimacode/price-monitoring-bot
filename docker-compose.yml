services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: price_monitor
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_USER:-admin}", "-p", "${MONGO_PASSWORD:-changeme}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "27017:27017"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      LOG_FILE: /app/logs/bot.log
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-20}
      SCRAPER_TIMEOUT: ${SCRAPER_TIMEOUT:-30s}
      SCHEDULER_FETCH_CRON: ${SCHEDULER_FETCH_CRON:-0 */10 * * * *}
      SCHEDULER_POST_CRON: ${SCHEDULER_POST_CRON:-0 */30 * * * *}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  mongo_data:
