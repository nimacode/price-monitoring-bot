services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: price_monitor
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      LOG_FILE: /app/logs/bot.log
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
